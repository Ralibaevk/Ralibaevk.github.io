<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Logiqa — Профиль</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body data-allowed-roles="*" data-page-role="profile">
    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="logo-area">
                <div class="logo-icon">L</div>
                <div class="logo-text">Logiqa</div>
            </div>

            <nav class="nav-links">
                <!-- Динамические ссылки на доступные роли -->
                <div id="roleLinks"></div>

                <div style="flex:1"></div>

                <div class="nav-item" id="nav-theme" onclick="app.toggleTheme()" title="Сменить тему">
                    <i class="fas fa-circle-half-stroke" id="themeIcon"></i> <span class="nav-text">Тема</span>
                </div>
                <div class="nav-item active" id="nav-profile" title="Профиль">
                    <i class="fas fa-user-circle"></i> <span class="nav-text">Профиль</span>
                </div>
            </nav>

            <button class="sidebar-toggle" onclick="app.toggleSidebar()">
                <i class="fas fa-chevron-left" id="sidebarIcon"></i>
            </button>
        </div>

        <div class="content-area">
            <div id="view-profile" class="screen active">
                <div id="profileContent">
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-spinner fa-spin"></i></div>
                        <h3>Загрузка...</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="b-item" id="mobileRoleLink"><i class="fas fa-home"></i><span>Главная</span></div>
        <div class="b-item active"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>

    <!-- Модалка редактора ролей -->
    <div id="rolesEditorModal" class="modal-overlay hidden">
        <div class="modal-box" style="width:400px;">
            <h3 id="rolesEditorTitle">Редактор ролей</h3>
            <div id="rolesEditorContent"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-text"
                    onclick="document.getElementById('rolesEditorModal').classList.add('hidden')">Отмена</button>
                <button class="btn btn-primary"
                    onclick="profile.saveRoles(document.getElementById('rolesEditorModal').dataset.userId)">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
    <script src="../js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('👤 Profile page loading...');
            app.initTheme();

            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            const isTelegramUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
            if (!isTelegramUser) {
                window.location.href = '../index.html';
                return;
            }

            app.user = window.Telegram.WebApp.initDataUnsafe.user;

            try {
                const userId = String(app.user.id);
                await api.call('saveTelegramUser', { user: app.user }, 'POST', false);
                await api.call('initSession', { userId: userId });

                // Рендерим профиль
                if (window.profile) profile.render();

                // Рендерим ссылки на доступные роли
                renderRoleLinks();

                const sidebarState = localStorage.getItem('logiqa_sidebar_state');
                if (sidebarState === 'closed') app.toggleSidebar(false);

            } catch (e) { console.error('Init error:', e); }
        });

        function renderRoleLinks() {
            const roles = window.CURRENT_USER_ROLES || auth.userRoles || [];
            const container = document.getElementById('roleLinks');
            const mobileLink = document.getElementById('mobileRoleLink');

            if (!container) return;

            let html = '';
            const pages = router.getAllowedPages(roles);

            if (pages.length > 0) {
                pages.forEach(p => {
                    html += `<div class="nav-item" onclick="location.href='${p.page}'" title="${p.name}">
            <i class="${getRoleIcon(p.role)}"></i> <span class="nav-text">${p.name}</span>
          </div>`;
                });

                // Мобильная ссылка на первую роль
                if (mobileLink) {
                    mobileLink.onclick = () => location.href = pages[0].page;
                }
            }

            container.innerHTML = html;
        }

        function getRoleIcon(role) {
            const icons = {
                manager: 'fas fa-folder',
                designer: 'fas fa-pencil-ruler',
                measurer: 'fas fa-ruler-combined',
                technologist: 'fas fa-cubes',
                supplier: 'fas fa-shopping-cart',
                production: 'fas fa-industry',
                installation: 'fas fa-hammer'
            };
            return icons[role] || 'fas fa-folder';
        }
    </script>
</body>

</html>
