<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Logiqa Supply</title>
  <!-- Подключаем библиотеку Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- Подключаем библиотеку Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Подключаем иконки -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css">
  <!-- ДОБАВИТЬ ЭТУ СТРОКУ -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div id="loader" class="hidden">
    <div class="spinner"></div>
  </div>

  <div class="main-layout">
    <!-- SIDEBAR (Desktop Only) -->
    <div class="sidebar">
      <div class="logo-area">
        <div class="logo-icon">L</div>
        <div class="logo-text">Logiqa</div>
      </div>
      <nav class="nav-links">
        <div class="nav-item active" onclick="app.goHome()">
          <i class="fas fa-th-large" style="width:20px;"></i> Проекты
        </div>
        <div class="nav-item" onclick="app.openArchive()">
          <i class="fas fa-archive" style="width:20px;"></i> Архив
        </div>
        <div class="nav-item" onclick="app.openSuppliersEdit()">
          <i class="fas fa-users" style="width:20px;"></i> Поставщики
        </div>
      </nav>
    </div>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- 1. DASHBOARD GRID -->
      <div id="view-dashboard" class="screen">
        <div class="dash-header">
          <div class="header-top-row">
            <h1 class="page-title">Проекты</h1>
            <button class="btn btn-primary" onclick="app.newProject()">
              <i class="fas fa-plus"></i> Новый проект
            </button>
          </div>

          <div class="tabs-row">
            <button class="tab-btn active" onclick="app.switchTab('new')" id="tab-btn-new">
              В работе <span class="tab-count" id="count-new">0</span>
            </button>
            <button class="tab-btn" onclick="app.switchTab('active')" id="tab-btn-active">
              Закуп <span class="tab-count" id="count-active">0</span>
            </button>
            <button class="tab-btn" onclick="app.switchTab('done')" id="tab-btn-done">
              Завершен <span class="tab-count" id="count-done">0</span>
            </button>
          </div>

          <div style="margin-top: 16px;">
            <div class="search-wrap">
              <i class="fas fa-search search-icon"></i>
              <input type="text" class="search-input" id="dashSearch" placeholder="Поиск проектов..."
                oninput="app.renderProjectsGrid()">
            </div>
          </div>
        </div>

        <div class="dash-content">
          <div id="projectsGrid" class="grid-container">
            <!-- Cards will be injected here -->
          </div>
        </div>
      </div>

      <!-- 2. ARCHIVE -->
      <div id="view-archive" class="screen hidden">
        <div class="dash-header">
          <div class="header-top-row">
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i></button>
              <h1 class="page-title">Архив</h1>
            </div>
          </div>
        </div>
        <div class="dash-content">
          <div class="grid-container" id="archiveList"></div>
        </div>
      </div>

      <!-- 3. MANAGER -->
      <div id="view-manager" class="screen hidden">
        <div class="dash-header">
          <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i> Назад</button>
            <input type="text" id="mgrName" placeholder="Название проекта" class="search-input"
              style="max-width:300px;">
            <button class="btn btn-primary" onclick="manager.save()">💾 Сохранить</button>
          </div>
        </div>

        <div class="tabs-scroll-container" id="mgrCategoryTabs"></div>

        <div class="mgr-toolbar">
          <input type="file" id="xlsInput" hidden>
          <button class="btn btn-def" onclick="document.getElementById('xlsInput').click()">📂 Импорт</button>

          <input type="file" id="catFileInput" hidden onchange="manager.uploadFile(this)">
          <button class="btn btn-def" onclick="document.getElementById('catFileInput').click()">📎 Файл</button>

          <button class="btn btn-def" onclick="manager.addRow()">➕ Стр.</button>
          <div style="width:1px; height:20px; background:#e5e7eb; margin:0 8px;"></div>
          <button class="btn btn-def" onclick="manager.sort()">🔃 Сорт.</button>
          <button class="btn btn-w" onclick="manager.openMerge()">🔗 Объед.</button>
          <button class="btn btn-p" onclick="manager.openSup()">🚚 Пост.</button>
          <button class="btn btn-d" onclick="manager.delSel()">🗑️</button>
          <div style="flex:1"></div>
          <input type="text" id="mgrSearch" placeholder="Поиск..." oninput="manager.render()" class="search-input"
            style="width:150px;">
          <span id="mgrTotal" style="font-weight:bold; color:#f59e0b; margin-left:10px;">0</span>
        </div>
        <div class="mgr-grid">
          <table id="mgrTable">
            <thead>
              <tr>
                <th class="chk"><input type="checkbox" id="mgrAll" onchange="manager.toggleAll(this.checked)"></th>
                <th style="width: 120px;">Категория</th>
                <th>Артикул</th>
                <th>Наименование</th>
                <th>Кол-во</th>
                <th>Ед.</th>
                <th>Цена</th>
                <th>Сумма</th>
                <th>Поставщик</th>
                <th>Примечание</th>
              </tr>
            </thead>
            <tbody id="mgrBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 4. BUYER -->
      <div id="view-buyer" class="screen hidden">
        <div class="buy-header">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span style="font-weight:800; font-size:20px; color:white;" id="buyTitle">Закуп</span>
            <button class="btn btn-text" style="color:white;" onclick="buyer.checkClose()">✕ Закрыть</button>
          </div>
          <div class="buy-tabs">
            <button id="tab-todo" class="buy-tab active" onclick="buyer.setTab('todo')">🛒 В работе</button>
            <button id="tab-done" class="buy-tab" onclick="buyer.setTab('done')">✅ Куплено</button>
          </div>
          <div class="filter-scroll" id="buyFilters" style="margin-top: 10px;"></div>
          <div class="buy-progress-wrap"
            style="color:white; margin-top:10px; display:flex; justify-content:space-between;">
            <span id="buyProgressText">0 / 0</span>
            <span id="buyTotalSum" style="font-weight:bold;">0 ₸</span>
          </div>
        </div>
        <div class="buy-list" id="buyList"></div>
        <div id="unsavedBar"
          style="padding:10px; background:#fff3cd; display:none; justify-content:space-between; align-items:center;">
          <span>Есть изменения</span>
          <button class="btn btn-primary" onclick="buyer.saveBatch()">💾 Сохранить</button>
        </div>
      </div>

    </div> <!-- End Content Area -->
  </div> <!-- End Main Layout -->

  <!-- === MODALS === -->
  <div id="modal" class="hidden">
    <div class="dash-header">
      <h2>Импорт</h2>
      <div>
        <button class="btn btn-text" onclick="document.getElementById('modal').classList.add('hidden')">Отмена</button>
        <button class="btn btn-primary" onclick="mapper.apply()">ОК</button>
      </div>
    </div>
    <div style="flex:1; overflow:auto; padding:20px;">
      <table id="mapTable"></table>
    </div>
  </div>

  <div id="supEditModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>👥 Поставщики</h3>
      <div style="max-height:400px; overflow:auto;">
        <table style="width:100%;">
          <tbody id="supEditBody"></tbody>
        </table>
        <button class="btn btn-def" style="width:100%; margin-top:10px;" onclick="app.addSupplierRow()">+
          Добавить</button>
      </div>
      <div style="text-align:right; margin-top:20px;">
        <button class="btn btn-text"
          onclick="document.getElementById('supEditModal').classList.add('hidden')">Закрыть</button>
        <button class="btn btn-primary" onclick="app.saveSuppliers()">Сохранить</button>
      </div>
    </div>
  </div>

  <div id="mergeModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Объединение</h3>
      <div id="mergeList" style="max-height:300px; overflow:auto;"></div>
      <div style="text-align:right; margin-top:10px;">
        <button class="btn btn-text"
          onclick="document.getElementById('mergeModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-w" onclick="manager.applyMerge()">ОК</button>
      </div>
    </div>
  </div>

  <div id="supModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Поставщик</h3>
      <select id="supSelect" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc;"></select>
      <div style="text-align:right;">
        <button class="btn btn-text" onclick="document.getElementById('supModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-primary" onclick="manager.applySup()">ОК</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
