<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Logiqa — Вход</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <div id="loader" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- LOGIN SCREEN (для браузерных пользователей) -->
  <div id="view-login" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon-big">L</div>
        <span class="login-brand">Logiqa</span>
      </div>

      <h1 class="login-title">Вход в аккаунт</h1>
      <p class="login-subtitle">Войдите через Telegram-бота,<br>чтобы получить доступ к системе</p>

      <a href="https://t.me/logiqa_work_bot?start=login" class="telegram-btn" target="_blank">
        <i class="fab fa-telegram"></i>
        Открыть в Telegram
      </a>

      <div class="login-divider">
        <span>или</span>
      </div>

      <div class="qr-block">
        <div class="qr-title">Сканируйте с телефона</div>
        <div class="qr-code" id="loginQR">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://t.me/logiqa_work_bot?start=login"
            alt="QR Code">
        </div>
        <div class="qr-hint" id="loginStatus">
          <i class="fas fa-spinner fa-spin"></i>
          Ожидание подтверждения...
        </div>
      </div>

      <div class="login-footer">
        Нажимая "Открыть в Telegram", вы соглашаетесь с<br>
        <a href="#">условиями использования</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Упрощённая инициализация только для редиректа
    (async function () {
      console.log('🔐 Login page init...');

      // Проверяем, это Telegram?
      const isTelegramUser = window.Telegram?.WebApp?.initDataUnsafe?.user;

      if (!isTelegramUser) {
        // Браузер — показываем экран входа
        console.log('🌐 Browser mode - showing login');
        document.getElementById('view-login').style.display = 'flex';
        return;
      }

      // Telegram — скрываем логин и начинаем редирект
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('loader').classList.remove('hidden');

      if (window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }

      const user = window.Telegram.WebApp.initDataUnsafe.user;
      const startParam = window.Telegram.WebApp.initDataUnsafe?.start_param || null;

      try {
        const userId = String(user.id);

        // Сохраняем пользователя
        await api.call('saveTelegramUser', { user: user }, 'POST', false);

        // Инициализируем сессию (устанавливает CURRENT_USER_ROLES)
        const hasCompany = await api.call('initSession', { userId: userId });

        // Обрабатываем код приглашения
        if (startParam && !window.CURRENT_COMPANY_ID) {
          try {
            await api.call('joinCompany', { code: startParam, userId: userId }, 'POST');
            await api.call('initSession', { userId: userId });
            alert('Вы успешно присоединились к компании!');
          } catch (e) {
            if (!e.message.includes('уже')) alert('Ошибка: ' + e.message);
          }
        }

        // Редирект по роли
        const userRoles = window.CURRENT_USER_ROLES || [];
        console.log('🔐 User roles:', userRoles);

        if (userRoles.length > 0 && window.router) {
          router.redirect(userRoles);
        } else {
          // Нет ролей — на профиль
          window.location.href = 'pages/profile.html';
        }

      } catch (e) {
        console.error('Init error:', e);
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('loginStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Ошибка: ' + e.message;
      }
    })();
  </script>
</body>

</html>
