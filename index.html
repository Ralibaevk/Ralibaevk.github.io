<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Logiqa Supply</title>
  <!-- Подключаем библиотеку Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- Подключаем иконки -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css">
  <!-- ДОБАВИТЬ ЭТУ СТРОКУ -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div id="loader" class="hidden">
    <div class="spinner"></div>
  </div>

  <!-- 1. DASHBOARD (ГЛАВНАЯ - КАНБАН) -->
  <div id="view-dashboard" class="screen">
    <div class="dash-header">
      <div class="dash-title">
        <h1>Logiqa Projects</h1>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-text" onclick="app.openArchive()">📦 Архив</button>
        <button class="btn btn-text" onclick="app.openSuppliersEdit()">👥 Поставщики</button>
        <button class="btn btn-primary" onclick="app.newProject()"><i class="fas fa-plus"></i> Проект</button>
      </div>
    </div>

    <div class="kanban-board">
      <div class="k-col" id="col-new" ondragover="app.allowDrop(event)" ondrop="app.drop(event, 'new')">
        <div class="k-head h-new">📝 Формируется</div>
        <div class="k-list" id="list-new"></div>
      </div>
      <div class="k-col" id="col-active" ondragover="app.allowDrop(event)" ondrop="app.drop(event, 'active')">
        <div class="k-head h-active">🛒 Закуп</div>
        <div class="k-list" id="list-active"></div>
      </div>
      <div class="k-col" id="col-done" ondragover="app.allowDrop(event)" ondrop="app.drop(event, 'done')">
        <div class="k-head h-done">✅ Завершен</div>
        <div class="k-list" id="list-done"></div>
      </div>
    </div>
  </div>

  <!-- 2. ARCHIVE (АРХИВ) -->
  <div id="view-archive" class="screen hidden">
    <div class="dash-header">
      <div class="dash-title">
        <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i> Назад</button>
        <span style="font-size:20px; font-weight:bold; margin-left:10px;">📦 Архив</span>
      </div>
    </div>
    <div class="project-grid" id="archiveList" style="padding:20px;"></div>
  </div>

  <!-- 3. MANAGER (МЕНЕДЖЕР) -->
  <div id="view-manager" class="screen hidden">
    <div class="dash-header">
      <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i> Назад</button>
      <input type="text" id="mgrName" placeholder="Название проекта" class="header-input">
      <button class="btn btn-primary" onclick="manager.save()">💾 Сохранить</button>
    </div>
    <div class="mgr-toolbar">
      <input type="file" id="xlsInput" hidden>
      <button class="btn btn-def" onclick="document.getElementById('xlsInput').click()">📂 Импорт</button>
      <button class="btn btn-def" onclick="manager.addRow()">➕ Стр.</button>
      <div class="sep"></div>
      <button class="btn btn-p" onclick="manager.sort()">🔃 Сорт.</button>
      <button class="btn btn-w" onclick="manager.openMerge()">🔗 Объед.</button>
      <button class="btn btn-p" onclick="manager.openSup()">🚚 Пост.</button>
      <button class="btn btn-d" onclick="manager.delSel()">🗑️</button>
      <div style="flex:1"></div>
      <input type="text" id="mgrSearch" placeholder="🔍..." oninput="manager.render()"
        style="width:100px; padding:5px;">
      <span id="mgrTotal" style="font-weight:bold; color:#666; margin-left:10px;">0</span>
    </div>
    <div class="mgr-grid">
      <table id="mgrTable">
        <thead>
          <tr>
            <th class="chk"><input type="checkbox" id="mgrAll" onchange="manager.toggleAll(this.checked)"></th>
            <th>Артикул</th>
            <th>Наименование</th>
            <th>Кол-во</th>
            <th>Ед.</th>
            <th>Цена</th>
            <th>Сумма</th>
            <th>Поставщик</th>
            <th>Примечание</th>
          </tr>
        </thead>
        <tbody id="mgrBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 4. BUYER (СНАБЖЕНЕЦ - ВОТ ТУТ ГЛАВНЫЕ ИЗМЕНЕНИЯ) -->
  <div id="view-buyer" class="screen hidden">
    <div class="buy-header">
      <!-- Шапка с кнопкой закрытия -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
        <span style="font-weight:800; font-size:20px; color:white;" id="buyTitle">Закуп</span>
        <button class="btn-close-app" onclick="buyer.checkClose()">✕ Закрыть</button>
      </div>

      <!-- Вкладки (Tabs) -->
      <div class="buy-tabs">
        <button id="tab-todo" class="buy-tab active" onclick="buyer.setTab('todo')">🛒 В работе</button>
        <button id="tab-done" class="buy-tab" onclick="buyer.setTab('done')">✅ Куплено</button>
      </div>

      <!-- Фильтры -->
      <div class="filter-scroll" id="buyFilters" style="margin-top: 10px;"></div>

      <!-- Прогресс -->
      <div class="buy-progress-wrap">
        <span id="buyProgressText">0 / 0</span>
        <span id="buyTotalSum" style="font-weight:bold;">0 ₸</span>
      </div>
    </div>

    <!-- Список -->
    <div class="buy-list" id="buyList"></div>

    <!-- Панель сохранения -->
    <div id="unsavedBar">
      <span>Есть изменения</span>
      <button class="save-btn" onclick="buyer.saveBatch()">💾 Сохранить</button>
    </div>
  </div>

  <!-- === МОДАЛЬНЫЕ ОКНА === -->
  <div id="modal" class="hidden">
    <div class="dash-header">
      <h2>Импорт</h2>
      <div>
        <button class="btn btn-text" onclick="document.getElementById('modal').classList.add('hidden')">Отмена</button>
        <button class="btn btn-primary" onclick="mapper.apply()">ОК</button>
      </div>
    </div>
    <div style="flex:1; overflow:auto; padding:20px;">
      <table id="mapTable"></table>
    </div>
  </div>

  <div id="supEditModal" class="modal-overlay hidden">
    <div class="modal-box" style="width:600px; max-width:95%;">
      <h3>👥 Поставщики</h3>
      <div style="max-height:400px; overflow:auto;">
        <table style="width:100%;">
          <tbody id="supEditBody"></tbody>
        </table>
        <button class="btn btn-def" style="width:100%; margin-top:10px;" onclick="app.addSupplierRow()">+
          Добавить</button>
      </div>
      <div style="text-align:right; margin-top:20px;">
        <button class="btn btn-text"
          onclick="document.getElementById('supEditModal').classList.add('hidden')">Закрыть</button>
        <button class="btn btn-p" onclick="app.saveSuppliers()">Сохранить</button>
      </div>
    </div>
  </div>

  <div id="mergeModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Объединение</h3>
      <div id="mergeList" style="max-height:300px; overflow:auto;"></div>
      <div style="text-align:right; margin-top:10px;">
        <button class="btn btn-text"
          onclick="document.getElementById('mergeModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-w" onclick="manager.applyMerge()">ОК</button>
      </div>
    </div>
  </div>

  <div id="supModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Поставщик</h3>
      <select id="supSelect" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc;"></select>
      <div style="text-align:right;">
        <button class="btn btn-text" onclick="document.getElementById('supModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-p" onclick="manager.applySup()">ОК</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
