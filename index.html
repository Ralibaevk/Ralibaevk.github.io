<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Logiqa Supply</title>
  <!-- Подключаем библиотеку Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- Подключаем библиотеку Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Подключаем иконки -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css">
  <!-- ДОБАВИТЬ ЭТУ СТРОКУ -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div id="loader" class="hidden">
    <div class="spinner"></div>
  </div>

  <div class="main-layout">
    <!-- SIDEBAR (Desktop Only) -->
    <div class="sidebar">
      <div class="logo-area">
        <div class="logo-icon">L</div>
        <div class="logo-text">Logiqa</div>
      </div>
      <nav class="nav-links">
        <div class="nav-item active" onclick="app.goHome()">
          <i class="fas fa-th-large" style="width:20px;"></i> Проекты
        </div>
        <div class="nav-item" onclick="app.openArchive()">
          <i class="fas fa-archive" style="width:20px;"></i> Архив
        </div>
        <div class="nav-item" onclick="app.openSuppliersEdit()">
          <i class="fas fa-users" style="width:20px;"></i> Поставщики
        </div>
        <div class="nav-item" onclick="profile.open()">
          <i class="fas fa-user-circle" style="width:20px;"></i> Профиль
        </div>
      </nav>
    </div>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- 5. PROFILE SCREEN -->
      <div id="view-profile" class="screen hidden" style="overflow-y:auto;">
        <div class="dash-header">
          <h1 class="page-title">Профиль</h1>
        </div>
        <div class="dash-content">
          <div id="profileContent" style="max-width: 600px; margin: 0 auto;"></div>
        </div>
      </div>

      <!-- 1. DASHBOARD GRID -->
      <div id="view-dashboard" class="screen">
        <div class="dash-header">
          <div class="header-top-row">
            <h1 class="page-title">Проекты</h1>
            <!-- Кнопка "Новый проект" только для десктопа -->
            <button class="btn btn-primary desktop-only-btn" style="display: flex;" onclick="app.newProject()">
              <i class="fas fa-plus"></i> Новый проект
            </button>
          </div>

          <!-- Поиск -->
          <div style="margin-top: 16px;">
            <div class="search-wrap">
              <i class="fas fa-search search-icon"></i>
              <input type="text" class="search-input" id="dashSearch" placeholder="Поиск проектов..."
                oninput="app.renderProjectsGrid()">
            </div>
          </div>

          <!-- Табы -->
          <div class="tabs-row">
            <button class="tab-btn active" onclick="app.switchTab('new')" id="tab-btn-new">
              В работе <span class="tab-count" id="count-new">0</span>
            </button>
            <button class="tab-btn" onclick="app.switchTab('active')" id="tab-btn-active">
              Закуп <span class="tab-count" id="count-active">0</span>
            </button>
            <button class="tab-btn" onclick="app.switchTab('done')" id="tab-btn-done">
              Завершен <span class="tab-count" id="count-done">0</span>
            </button>
          </div>
        </div>

        <div class="dash-content">
          <div id="projectsGrid" class="grid-container"></div>
        </div>
      </div>

      <!-- 2. ARCHIVE -->
      <div id="view-archive" class="screen hidden">
        <div class="dash-header">
          <div class="header-top-row">
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i></button>
              <h1 class="page-title">Архив</h1>
            </div>
          </div>
        </div>
        <div class="dash-content">
          <div class="grid-container" id="archiveList"></div>
        </div>
      </div>

      <!-- 3. MANAGER -->
      <div id="view-manager" class="screen hidden">
        <div class="dash-header">
          <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center;">
            <button class="btn btn-text" onclick="app.goHome()"><i class="fas fa-arrow-left"></i> Назад</button>
            <input type="text" id="mgrName" placeholder="Название проекта" class="search-input"
              oninput="manager.triggerAutoSave()" style="max-width:300px; padding: 8px 12px;">
            <!-- Индикатор сохранения -->
            <div id="saveStatus"
              style="color:#888; font-size:13px; font-weight:500; display:flex; align-items:center; gap:5px;">
              <i class="fas fa-check-circle" style="color:#10b981;"></i> Сохранено
            </div>
          </div>
        </div>

        <div class="tabs-scroll-container" id="mgrCategoryTabs"></div>

        <div class="mgr-toolbar">
          <!-- Группа Импорта -->
          <input type="file" id="xlsInput" hidden>
          <button class="toolbar-btn" onclick="document.getElementById('xlsInput').click()" title="Импорт Excel">
            <i class="fas fa-file-excel"></i> <span>Импорт</span>
          </button>

          <input type="file" id="catFileInput" hidden onchange="manager.uploadFile(this)">
          <button class="toolbar-btn" onclick="document.getElementById('catFileInput').click()" title="Прикрепить файл">
            <i class="fas fa-paperclip"></i>
          </button>

          <!-- Разделитель -->
          <div style="width:1px; height:24px; background:var(--border); margin:0 8px;"></div>

          <!-- Основные действия -->
          <button class="toolbar-btn toolbar-btn-primary" onclick="manager.addRow()">
            <i class="fas fa-plus"></i> <span>Строка</span>
          </button>

          <button class="toolbar-btn" onclick="manager.sort()" title="Сортировка">
            <i class="fas fa-sort-alpha-down"></i>
          </button>

          <button class="toolbar-btn" onclick="manager.openMerge()" title="Объединить">
            <i class="fas fa-link"></i>
          </button>

          <button class="toolbar-btn" onclick="manager.openSup()" title="Назначить поставщика">
            <i class="fas fa-truck"></i>
          </button>

          <div style="flex:1"></div>

          <!-- Поиск и Удаление -->
          <div class="search-wrap" style="width: auto; margin:0;">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="mgrSearch" placeholder="Поиск..." oninput="manager.render()" class="search-input"
              style="width:180px; padding: 8px 12px 8px 36px; height:36px;">
          </div>

          <button class="toolbar-btn toolbar-btn-danger" onclick="manager.delSel()" title="Удалить выбранное">
            <i class="fas fa-trash"></i>
          </button>

          <div style="width:1px; height:24px; background:var(--border); margin:0 8px;"></div>
          <span id="mgrTotal" style="font-weight:700; font-size:14px; color:var(--text-main);">0 ₸</span>
        </div>

        <div class="mgr-grid">
          <table id="mgrTable">
            <thead>
              <tr>
                <th class="chk"><input type="checkbox" id="mgrAll" onchange="manager.toggleAll(this.checked)"></th>
                <th style="width: 120px;">Категория</th>
                <th>Артикул</th>
                <th>Наименование</th>
                <th>Кол-во</th>
                <th>Ед.</th>
                <th>Цена</th>
                <th>Сумма</th>
                <th>Поставщик</th>
                <th>Примечание</th>
              </tr>
            </thead>
            <tbody id="mgrBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 4. BUYER (ОБНОВЛЕННЫЙ ДИЗАЙН) -->
      <div id="view-buyer" class="screen hidden">

        <!-- Фиксированная шапка -->
        <div class="buy-tools-wrapper">
          <div class="buy-nav-row">
            <div style="display:flex; flex-direction:column; overflow:hidden;">
              <span class="buy-title" id="buyTitle">Загрузка...</span>
              <!-- НОВЫЙ ИНДИКАТОР -->
              <div id="buySaveStatus" style="font-size:12px; color:#10b981; font-weight:500; margin-top:2px;">
                <i class="fas fa-check-circle"></i> Сохранено
              </div>
            </div>

            <button class="btn-close-app" onclick="buyer.checkClose()"
              style="background:#f3f4f6; color:#333; border:none;">
              ✕ Закрыть
            </button>
          </div>

          <!-- Табы -->
          <!-- Табы (В работе / Куплено) -->
          <div class="buy-tabs">
            <button id="tab-todo" class="buy-tab active" onclick="buyer.setTab('todo')">🛒 В работе</button>
            <button id="tab-done" class="buy-tab" onclick="buyer.setTab('done')">✅ Куплено</button>
          </div>

          <!-- НОВОЕ: Фильтр Категорий (Крупный) -->
          <div class="filter-label">Категория:</div>
          <div class="filter-scroll" id="buyCategoryFilters"></div>

          <!-- Фильтр Поставщиков (Мелкий) -->
          <div class="filter-label" style="margin-top:5px;">Поставщик:</div>

          <!-- Фильтры -->
          <div class="filter-scroll" id="buyFilters"></div>
        </div>

        <!-- Скроллящийся список -->
        <div class="buy-list" id="buyList"></div>


      </div>

    </div> <!-- End Content Area -->
  </div> <!-- End Main Layout -->

  <!-- === MODALS === -->
  <!-- === MOBILE FLOATING BUTTON (FAB) === -->
  <button class="fab-btn" onclick="app.newProject()">
    <i class="fas fa-plus"></i>
  </button>

  <!-- === MOBILE BOTTOM NAVIGATION === -->
  <div class="bottom-nav">
    <div class="b-nav-item active" onclick="app.goHome()">
      <i class="fas fa-th-large"></i>
      <span>Проекты</span>
    </div>
    <div class="b-nav-item" onclick="app.openArchive()">
      <i class="fas fa-archive"></i>
      <span>Архив</span>
    </div>
    <div class="b-nav-item" onclick="app.openSuppliersEdit()">
      <i class="fas fa-users"></i>
      <span>Поставщики</span>
    </div>
    <div class="b-nav-item" onclick="profile.open()">
      <i class="fas fa-user-circle"></i>
      <span>Профиль</span>
    </div>
    <div class="b-nav-item" style="color:#ef4444;" onclick="alert('Логика выхода')">
      <i class="fas fa-sign-out-alt"></i>
      <span>Выйти</span>
    </div>
  </div>

  <div id="modal" class="hidden">
    <div class="dash-header">
      <h2>Импорт</h2>
      <div>
        <button class="btn btn-text" onclick="document.getElementById('modal').classList.add('hidden')">Отмена</button>
        <button class="btn btn-primary" onclick="mapper.apply()">ОК</button>
      </div>
    </div>
    <div style="flex:1; overflow:auto; padding:20px;">
      <table id="mapTable"></table>
    </div>
  </div>

  <div id="supEditModal" class="modal-overlay hidden">
    <div class="modal-box" style="width:500px; max-width:95%;">
      <h3>👥 Поставщики</h3>

      <!-- Контейнер для списка -->
      <div id="supListContainer" class="sup-list"></div>

      <button class="btn-add-sup" onclick="app.addSupplierRow()">
        <i class="fas fa-plus"></i> Добавить поставщика
      </button>

      <div style="text-align:right; margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
        <button class="btn btn-text" onclick="document.getElementById('supEditModal').classList.add('hidden')">
          Отмена
        </button>
        <button class="btn btn-primary" onclick="app.saveSuppliers()">
          Сохранить
        </button>
      </div>
    </div>
  </div>

  <div id="mergeModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Объединение</h3>
      <div id="mergeList" style="max-height:300px; overflow:auto;"></div>
      <div style="text-align:right; margin-top:10px;">
        <button class="btn btn-text"
          onclick="document.getElementById('mergeModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-w" onclick="manager.applyMerge()">ОК</button>
      </div>
    </div>
  </div>

  <div id="supModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Поставщик</h3>
      <select id="supSelect" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ccc;"></select>
      <div style="text-align:right;">
        <button class="btn btn-text" onclick="document.getElementById('supModal').classList.add('hidden')">Отм.</button>
        <button class="btn btn-primary" onclick="manager.applySup()">ОК</button>
      </div>
    </div>
  </div>

  <!-- APP MODULES (Order Matters!) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/manager.js"></script>
  <script src="js/buyer.js"></script>
  <script src="js/design.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
